        theme: {
          extend: {
            colors: {
              printz: {
                app: "#F7F3EF", // fondo de app
                canvas: "#EDE8E2", // fondo exterior / lienzo

                redlink: "#8F1226",
                selection: "#FCEEE9", // relleno selección suave

                grafito: "#4A4744",
                ok: "#2F7D56",
